services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      PORT: 3001
      STORAGE_DIR: /workspace/data
      WORK_DIR: /workspace/deployments
      BUILDKIT_HOST: tcp://brimble-buildkit:1234
      CADDY_BASE_URL:
      CADDY_ADMIN_URL: http://caddy:2019/load
      DOCKER_NETWORK: brimble-network
      APP_PORT: 3000
      PUBLIC_BASE_URL: http://localhost:8081
    volumes:
      - deployment-data:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - buildkit
    networks:
      - default

  caddy:
    build:
      context: .
      dockerfile: infra/caddy.Dockerfile
    ports:
      - "8081:8080"
      - "2019:2019"
    depends_on:
      - api
    networks:
      - default

  buildkit:
    image: moby/buildkit:latest
    container_name: brimble-buildkit
    privileged: true
    command: ["--addr", "tcp://0.0.0.0:1234"]
    ports:
      - "1234:1234"
    networks:
      - default

volumes:
  deployment-data:

networks:
  default:
    name: brimble-network
